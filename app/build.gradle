plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.clock'
    compileSdk 34

    defaultConfig {
        applicationId "com.example.clock"
        // Min SDK 26 (Android 8.0) is recommended due to our Foreground Service implementation
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // Because we are using only standard Android classes, 
    // we don't need any external dependencies or AndroidX libraries!
}
